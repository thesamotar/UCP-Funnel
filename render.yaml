# Render free-tier deploy (Blueprint): ONE web service runs all three
# processes. The retailer mocks bind container-private localhost ports
# (9001/9002); only the UCP node binds Render's public $PORT.
#
# Setup:
#   1. Create a free Supabase project → run db/schema.sql in the SQL editor →
#      seed it (locally: python -m db.seed with the Supabase env vars set).
#   2. Push this repo to GitHub → Render dashboard → New → Blueprint →
#      pick the repo → fill the secrets when prompted.
#
# Free-tier caveats: the service spins down after ~15 min idle (first request
# cold-starts in ~1 min) — carts/orders survive because state lives in
# Supabase. Supabase's free tier pauses after ~1 week of inactivity; resume it
# from the dashboard.
services:
  - type: web
    name: tata-node
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -m uvicorn mocks.bigbasket.app:app --port 9001 &
      python -m uvicorn mocks.croma.app:app --port 9002 &
      python -m uvicorn wrapper.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ANTHROPIC_API_KEY
        sync: false          # set in the Render dashboard, never committed
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false          # public/publishable key — the browser gets it via /api/config
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # server-only; bypasses RLS
      - key: SUPABASE_JWT_SECRET
        sync: false          # optional — leave empty to verify via JWKS instead
